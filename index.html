<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- font awsome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- tailwind css cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="/assets/css/style.css" />
    <title>Fast Drop | Logistic Website</title>
    <style type="text/tailwindcss">
      @theme {
        --color-primary: #00bba7;
        --color-hover: #009689;
        --color-secondary: #162636;
        --color-gray: #90a1b9;
      }
      .container {
        @apply px-4 lg:px-0 w-full max-w-110 sm:max-w-150 md:max-w-187.5 lg:max-w-250 xl:max-w-300 2xl:max-w-325 mx-auto;
      }
      .btn::after {
        position: absolute;
        content: "";
        width: 0;
        height: 100%;
        background: #162636;
        left: 0;
        top: 0;
        transition: all 0.3s ease-in-out;
        border-radius: 0 50% 50% 0;
      }
      .btn:hover::after {
        width: 170%;
      }
      .btn {
        position: relative;
        overflow: hidden;
      }
      .btn > * {
        position: relative;
        z-index: 1;
        transition: all 0.1s ease-in-out;
      }
      .btn:hover > * {
        color: white;
      }

      .menu-toogler {
        @apply opacity-100 pointer-events-auto duration-150;
      }

      .menu-sidebar-toggle {
        @apply translate-x-0 duration-300;
      }
    </style>
  </head>
  <body>
    <!-- header start -->
    <header>
      <div>
        <div class="container">
          <div>
            <!-- destop menu and logo start -->
            <div class="flex items-center justify-between gap-5 py-3">
              <div class="w-40 md:w-50 shrink-0">
                <a href="/">
                  <img
                    src="/assets/images/logo.png"
                    alt="fast-drop"
                    class="w-full"
                  />
                </a>
              </div>

              <!-- desktop menu start-->
              <div>
                <nav>
                  <div class="hidden lg:flex items-center gap-5">
                    <div>
                      <ul class="flex items-center gap-5 text-lg uppercase">
                        <li>
                          <a href="/">Home</a>
                        </li>
                        <li>
                          <a href="#">About</a>
                        </li>
                        <li>
                          <a href="#">Contact</a>
                        </li>
                        <li>
                          <a href="#">Blog</a>
                        </li>
                      </ul>
                    </div>
                    <div class="btn bg-primary">
                      <a href="#" class="uppercase px-4 py-2 block text-white"
                        >Tracking</a
                      >
                    </div>
                  </div>
                  <!-- menu bar open for mobile -->
                  <div
                    onclick="MobileMenuToggle()"
                    class="lg:hidden cursor-pointer bg-primary w-8 h-8 flex items-center justify-center text-white hover:bg-hover duration-75"
                  >
                    <i class="fa-solid fa-bars"></i>
                  </div>
                </nav>
              </div>
              <!-- desktop menu end-->
            </div>
            <!-- destop menu and logo end -->

            <!-- mobile menu modal start -->
            <nav
              id="mobileMenuModal"
              class="opacity-0 pointer-events-none duration-150"
            >
              <div
                onclick="MobileMenuToggle()"
                class="fixed bg-black/40 w-full h-screen top-0 left-0 flex justify-end items-center z-20"
              >
                <div
                  id="menuSidebar"
                  onclick="event.stopPropagation()"
                  class="bg-white translate-x-full w-full max-w-sm h-full overflow-y-auto p-4 duration-300"
                >
                  <div
                    class="flex items-center justify-between border-b border-gray-300 pb-4 mb-4"
                  >
                    <div class="w-40 shrink-0">
                      <a href="/">
                        <img
                          src="/assets/images/logo.png"
                          alt="fast-drop"
                          class="w-full"
                        />
                      </a>
                    </div>
                    <div
                      onclick="MobileMenuToggle()"
                      class="lg:hidden cursor-pointer bg-primary w-8 h-8 flex items-center justify-center text-white hover:bg-hover duration-75"
                    >
                      <i class="fa-solid fa-xmark"></i>
                    </div>
                  </div>

                  <!-- menus -->
                  <div>
                    <ul class="flex flex-col gap-3 uppercase mb-3">
                      <li>
                        <a
                          href="/"
                          class="bg-gray-200/70 block py-2 px-4 hover:bg-primary hover:text-white duration-150"
                          >Home</a
                        >
                      </li>
                      <li>
                        <a
                          href="#"
                          class="bg-gray-200/70 block py-2 px-4 hover:bg-primary hover:text-white duration-150"
                          >About</a
                        >
                      </li>
                      <li>
                        <a
                          href="#"
                          class="bg-gray-200/70 block py-2 px-4 hover:bg-primary hover:text-white duration-150"
                          >Contact</a
                        >
                      </li>
                      <li>
                        <a
                          href="#"
                          class="bg-gray-200/70 block py-2 px-4 hover:bg-primary hover:text-white duration-150"
                          >Blog</a
                        >
                      </li>
                    </ul>
                    <div class="btn bg-primary">
                      <a href="#" class="uppercase px-4 py-2 block text-white"
                        >Tracking</a
                      >
                    </div>
                  </div>
                  <!-- menus -->
                </div>
              </div>
            </nav>
            <!-- mobile menu modal end -->
          </div>
        </div>
      </div>
    </header>
    <!-- header end -->

    <!-- main body start -->
    <main></main>
    <!-- main body end -->

    <!-- footer start -->
    <footer></footer>
    <!-- footer end -->

    <!-- script code -->
    <script src="/assets/javaScript/script.js"></script>
  </body>
</html>
